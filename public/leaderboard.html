<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InterviewHub — Leaderboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f; color: #e0e0e0; min-height: 100vh;
    }

    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 24px; background: #1a1a1a; border-bottom: 1px solid #2a2a2a;
    }
    .topbar h1 { font-size: 15px; font-weight: 500; }
    .nav { display: flex; gap: 10px; }
    .nav a {
      font-size: 13px; color: #888; text-decoration: none;
      padding: 5px 12px; border: 1px solid #2a2a2a; border-radius: 8px;
    }
    .nav a:hover { background: #222; color: #fff; }

    .container { max-width: 720px; margin: 0 auto; padding: 32px 24px; }

    .page-title { font-size: 22px; font-weight: 500; margin-bottom: 6px; }
    .page-sub { font-size: 13px; color: #666; margin-bottom: 28px; }

    /* Contest selector */
    .contest-selector { display: flex; gap: 10px; margin-bottom: 28px; }
    #contestIdInput {
      flex: 1; padding: 9px 14px; background: #1a1a1a;
      border: 1px solid #2a2a2a; border-radius: 8px;
      color: #e0e0e0; font-size: 14px; outline: none; font-family: monospace;
    }
    .btn-watch {
      padding: 9px 20px; background: #fff; color: #000;
      border: none; border-radius: 8px; font-size: 13px;
      font-weight: 500; cursor: pointer;
    }
    .btn-watch:hover { opacity: 0.88; }

    /* Leaderboard */
    .lb-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 14px;
    }
    .lb-title { font-size: 15px; font-weight: 500; }
    .live-badge {
      display: flex; align-items: center; gap: 6px;
      font-size: 11px; color: #4ade80; background: #1e2a1e;
      padding: 3px 10px; border-radius: 20px;
    }
    .live-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: #4ade80; animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .lb-table {
      border: 1px solid #2a2a2a; border-radius: 10px; overflow: hidden;
    }
    .lb-row {
      display: flex; align-items: center; gap: 14px;
      padding: 13px 18px; border-bottom: 1px solid #1e1e1e;
      transition: background 0.15s;
    }
    .lb-row:last-child { border-bottom: none; }
    .lb-row:hover { background: #161616; }
    .lb-row.top1 { background: #1e1e10; }
    .lb-row.top2 { background: #181818; }
    .lb-row.top3 { background: #161616; }

    .rank {
      font-size: 15px; font-weight: 500; min-width: 28px; text-align: center;
    }
    .rank-1 { color: #fbbf24; }
    .rank-2 { color: #9ca3af; }
    .rank-3 { color: #b45309; }

    .username { flex: 1; font-size: 14px; color: #e0e0e0; }
    .score {
      font-size: 14px; font-weight: 500; color: #4ade80;
      font-family: monospace;
    }

    .empty {
      text-align: center; padding: 48px 24px;
      color: #444; font-size: 14px; border: 1px solid #2a2a2a; border-radius: 10px;
    }

    /* Interviewer controls */
    #interviewerPanel {
      display: none; margin-top: 32px;
      border: 1px solid #2a402a; border-radius: 10px; padding: 20px;
    }
    #interviewerPanel h3 { font-size: 14px; font-weight: 500; margin-bottom: 14px; color: #4ade80; }
    .score-form { display: flex; gap: 10px; flex-wrap: wrap; }
    .score-form input {
      padding: 8px 12px; background: #111; border: 1px solid #2a2a2a;
      border-radius: 8px; color: #e0e0e0; font-size: 13px; outline: none;
    }
    .btn-award {
      padding: 8px 16px; background: #1e2a1e; border: 1px solid #2a402a;
      color: #4ade80; border-radius: 8px; font-size: 13px; cursor: pointer;
    }
    .btn-award:hover { background: #253525; }
    .btn-end {
      padding: 8px 16px; background: #2a1010; border: 1px solid #5a2020;
      color: #f87171; border-radius: 8px; font-size: 13px; cursor: pointer;
    }
    .status-msg { font-size: 12px; color: #888; margin-top: 10px; }
  </style>
</head>
<body>

<div class="topbar">
  <h1>InterviewHub · Leaderboard</h1>
  <div class="nav">
    <a href="/room.html">← Back to Room</a>
    <a href="#" onclick="logout()">Logout</a>
  </div>
</div>

<div class="container">
  <div class="page-title">Live Leaderboard</div>
  <p class="page-sub">Enter a contest ID to subscribe to its real-time leaderboard</p>

  <div class="contest-selector">
    <input id="contestIdInput" placeholder="Paste contest ID here..." />
    <button class="btn-watch" onclick="watchContest()">Watch Live</button>
  </div>

  <!-- Live leaderboard table -->
  <div id="lbSection" style="display:none">
    <div class="lb-header">
      <span class="lb-title" id="lbContestTitle">Contest Leaderboard</span>
      <div class="live-badge">
        <div class="live-dot"></div>
        LIVE
      </div>
    </div>
    <div id="leaderboardTable" class="lb-table">
      <div class="empty">Waiting for participants...</div>
    </div>
  </div>

  <!-- Interviewer-only: award scores + end contest -->
  <div id="interviewerPanel">
    <h3>⚡ Award Score</h3>
    <div class="score-form">
      <input id="awardUserId" placeholder="User ID" style="width:180px" />
      <input id="awardUsername" placeholder="Username" style="width:140px" />
      <input id="awardPoints" type="number" placeholder="Points" style="width:90px" min="1" value="10" />
      <button class="btn-award" onclick="awardScore()">Award</button>
      <button class="btn-end" onclick="endContest()">End Contest</button>
    </div>
    <div class="status-msg" id="awardStatus"></div>
  </div>
</div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script src="/app.js"></script>
<script>
  if (!requireAuth()) throw new Error('not authed');

  const user = getUser();
  let socket = null;
  let currentContestId = null;

  // Show the URL param contest ID if present (e.g. /leaderboard.html?contest=xxx)
  const urlParams = new URLSearchParams(window.location.search);
  const contestParam = urlParams.get('contest');
  if (contestParam) {
    document.getElementById('contestIdInput').value = contestParam;
    setTimeout(watchContest, 300);
  }

  function watchContest() {
    const id = document.getElementById('contestIdInput').value.trim();
    if (!id) return;

    currentContestId = id;
    document.getElementById('lbSection').style.display = 'block';

    // Show interviewer panel for interviewers
    if (user.role === 'interviewer') {
      document.getElementById('interviewerPanel').style.display = 'block';
    }

    // Connect socket and subscribe to this contest's leaderboard
    if (socket) socket.disconnect();
    socket = createSocket();

    socket.on('connect', () => {
      socket.emit('leaderboard:join', { contestId: id });
    });

    // This fires whenever any score changes — server pushes automatically
    socket.on('leaderboard:update', (entries) => {
      renderLeaderboard(entries);
    });
  }

  function renderLeaderboard(entries) {
    const table = document.getElementById('leaderboardTable');

    if (!entries || entries.length === 0) {
      table.innerHTML = '<div class="empty">No participants yet</div>';
      return;
    }

    table.innerHTML = entries.map((entry) => {
      const rankClass = entry.rank <= 3 ? `top${entry.rank}` : '';
      const rankEmoji = entry.rank === 1 ? '🥇' : entry.rank === 2 ? '🥈' : entry.rank === 3 ? '🥉' : entry.rank;
      const rankColor = entry.rank === 1 ? 'rank-1' : entry.rank === 2 ? 'rank-2' : entry.rank === 3 ? 'rank-3' : '';

      return `
        <div class="lb-row ${rankClass}">
          <div class="rank ${rankColor}">${rankEmoji}</div>
          <div class="username">${entry.username}</div>
          <div class="score">+${entry.score} pts</div>
        </div>
      `;
    }).join('');
  }

  async function awardScore() {
    const userId = document.getElementById('awardUserId').value.trim();
    const username = document.getElementById('awardUsername').value.trim();
    const points = parseInt(document.getElementById('awardPoints').value);

    if (!userId || !username || !points) {
      document.getElementById('awardStatus').textContent = 'Fill in all fields';
      return;
    }

    try {
      const res = await api('POST', `/contests/${currentContestId}/score`, {
        userId, username, points,
      });
      document.getElementById('awardStatus').textContent =
        `✓ Awarded ${points} pts to ${username}. New score: ${res.newScore}`;
    } catch (err) {
      document.getElementById('awardStatus').textContent = err.message;
    }
  }

  async function endContest() {
    if (!confirm('End this contest? Final scores will be saved.')) return;
    try {
      await api('POST', `/contests/${currentContestId}/end`);
      document.getElementById('awardStatus').textContent = '✓ Contest ended. Scores saved to database.';
      document.getElementById('interviewerPanel').style.opacity = '0.5';
      document.getElementById('interviewerPanel').style.pointerEvents = 'none';
    } catch (err) {
      document.getElementById('awardStatus').textContent = err.message;
    }
  }

  function logout() {
    socket?.disconnect();
    clearSession();
    window.location.href = '/index.html';
  }
</script>
</body>
</html>
